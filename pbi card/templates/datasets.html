<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Dataset Manager</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f5f7fa; }
        .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px; text-align: center; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .nav { margin-bottom: 20px; }
        .nav a { background: #667eea; color: white; padding: 10px 20px; text-decoration: none; border-radius: 5px; margin-right: 10px; }
        .nav a:hover { background: #5a6fd8; }
        .summary-card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 30px; }
        .summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-top: 20px; }
        .summary-item { text-align: center; padding: 15px; background: #f8f9fa; border-radius: 8px; }
        .summary-value { font-size: 1.8em; font-weight: bold; color: #667eea; }
        .summary-label { color: #666; margin-top: 5px; }
        .datasets-card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .dataset-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; border: 1px solid #eee; border-radius: 8px; margin-bottom: 10px; }
        .dataset-info { flex: 1; }
        .dataset-name { font-weight: bold; color: #333; }
        .dataset-meta { color: #666; font-size: 0.9em; margin-top: 5px; }
        .dataset-actions { display: flex; gap: 10px; }
        .btn { padding: 8px 16px; border: none; border-radius: 5px; cursor: pointer; font-size: 14px; transition: all 0.3s; }
        .btn-download { background: #28a745; color: white; }
        .btn-download:hover { background: #218838; }
        .btn-delete { background: #dc3545; color: white; }
        .btn-delete:hover { background: #c82333; }
        .btn-clear-all { background: #dc3545; color: white; padding: 12px 24px; font-size: 16px; margin-top: 20px; }
        .btn-clear-all:hover { background: #c82333; }
        .loading { text-align: center; padding: 50px; color: #666; }
        .empty-state { text-align: center; padding: 50px; color: #666; }
        .fraud-rate { color: #dc3545; font-weight: bold; }
        .safe-rate { color: #28a745; font-weight: bold; }
    </style>
</head>
<body>
    <div class="header">
        <h1>&#128193; Dataset Manager</h1>
        <p>Manage uploaded datasets and view analysis summaries</p>
    </div>

    <div class="container">
        <!-- Navbar -->
        <nav style="background:linear-gradient(135deg,#667eea,#764ba2);padding:0 20px;display:flex;align-items:center;justify-content:space-between;height:54px;border-radius:10px;margin-bottom:20px">
          <a href="/fraud/" style="color:white;font-size:1.1rem;font-weight:700;text-decoration:none">&#128737; FraudGuard</a>
          <div style="display:flex;gap:4px;align-items:center">
            <a href="/" style="color:rgba(255,255,255,0.85);text-decoration:none;padding:7px 14px;border-radius:6px;font-size:0.88rem">&#127968; Home</a>
            <a href="/fraud/" style="color:rgba(255,255,255,0.85);text-decoration:none;padding:7px 14px;border-radius:6px;font-size:0.88rem">&#128228; Upload</a>
            <a href="/fraud/dashboard" style="color:rgba(255,255,255,0.85);text-decoration:none;padding:7px 14px;border-radius:6px;font-size:0.88rem">&#128202; Dashboard</a>
            <a href="/fraud/datasets" style="color:white;text-decoration:none;padding:7px 14px;border-radius:6px;font-size:0.88rem;background:rgba(255,255,255,0.2)">&#128193; Datasets</a>
            <a href="/" style="color:#ffc9c9;text-decoration:none;padding:7px 14px;border-radius:6px;font-size:0.88rem;background:rgba(231,76,60,0.3);border:1px solid rgba(231,76,60,0.4);margin-left:6px">&#8592; Logout</a>
          </div>
        </nav>

        <div class="summary-card">
            <h2>📈 Overall Analysis Summary</h2>
            <div id="summaryContent" class="loading">Loading summary...</div>
        </div>

        <div class="datasets-card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2>📁 Uploaded Datasets</h2>
                <button class="btn btn-clear-all" id="clearAllBtn">🗑️ Clear All Data</button>
            </div>
            <div id="datasetsContent" class="loading">Loading datasets...</div>
        </div>
    </div>

    <script>
        async function loadData() {
            try {
                const response = await fetch('/fraud/api/datasets');
                const data = await response.json();
                
                displaySummary(data.summary);
                displayDatasets(data.files);
                
            } catch (error) {
                console.error('Error loading data:', error);
                document.getElementById('summaryContent').innerHTML = '<div class="empty-state">Error loading data</div>';
                document.getElementById('datasetsContent').innerHTML = '<div class="empty-state">Error loading datasets</div>';
            }
        }

        function displaySummary(summary) {
            if (!summary || Object.keys(summary).length === 0) {
                document.getElementById('summaryContent').innerHTML = '<div class="empty-state">No data available. Upload a dataset to see analysis summary.</div>';
                return;
            }

            const fraudRateClass = summary.fraud_rate > 5 ? 'fraud-rate' : 'safe-rate';
            
            document.getElementById('summaryContent').innerHTML = `
                <div class="summary-grid">
                    <div class="summary-item">
                        <div class="summary-value">${summary.total_transactions.toLocaleString()}</div>
                        <div class="summary-label">Total Transactions</div>
                    </div>
                    <div class="summary-item">
                        <div class="summary-value" style="color: #dc3545;">${summary.fraud_count.toLocaleString()}</div>
                        <div class="summary-label">Fraud Detected</div>
                    </div>
                    <div class="summary-item">
                        <div class="summary-value ${fraudRateClass}">${summary.fraud_rate}%</div>
                        <div class="summary-label">Fraud Rate</div>
                    </div>
                    <div class="summary-item">
                        <div class="summary-value">$${summary.total_amount.toLocaleString()}</div>
                        <div class="summary-label">Total Amount</div>
                    </div>
                    <div class="summary-item">
                        <div class="summary-value">${summary.avg_risk_score}</div>
                        <div class="summary-label">Avg Risk Score</div>
                    </div>
                    <div class="summary-item">
                        <div class="summary-value">${new Date(summary.first_transaction).toLocaleDateString()}</div>
                        <div class="summary-label">First Transaction</div>
                    </div>
                </div>
            `;
        }

        function displayDatasets(files) {
            if (!files || files.length === 0) {
                document.getElementById('datasetsContent').innerHTML = '<div class="empty-state">No datasets uploaded yet. Go to <a href="/">Home</a> to upload your first dataset.</div>';
                return;
            }

            const datasetsHtml = files.map(file => `
                <div class="dataset-item">
                    <div class="dataset-info">
                        <div class="dataset-name">📄 ${file.original_name}</div>
                        <div class="dataset-meta">
                            Size: ${file.size} KB | Uploaded: ${file.upload_date}
                        </div>
                    </div>
                    <div class="dataset-actions">
                        <button class="btn btn-download" onclick="downloadDataset('${file.filename}')">
                            📥 Download
                        </button>
                        <button class="btn btn-delete" onclick="deleteDataset('${file.filename}')">
                            🗑️ Delete
                        </button>
                    </div>
                </div>
            `).join('');

            document.getElementById('datasetsContent').innerHTML = datasetsHtml;
        }

        async function downloadDataset(filename) { window.location.href = '/fraud/download/' + filename; }

        async function deleteDataset(filename) {
            if (!confirm('Are you sure you want to delete ' + filename + '?')) return;
            try {
                const response = await fetch('/fraud/api/delete-dataset/' + filename, { method: 'DELETE' });
                const result = await response.json();
                if (result.success) { alert('Dataset deleted successfully'); loadData(); }
                else alert('Error: ' + result.error);
            } catch (error) { alert('Delete failed: ' + error.message); }
        }

        async function clearAllData() {
            if (!confirm('Are you sure you want to clear ALL data?')) return;
            try {
                const response = await fetch('/fraud/api/clear-all-data', { method: 'DELETE' });
                const result = await response.json();
                if (result.success) { alert('All data cleared successfully'); loadData(); }
                else alert('Error: ' + result.error);
            } catch (error) { alert('Clear failed: ' + error.message); }
        }

        // Event listeners
        document.getElementById('clearAllBtn').addEventListener('click', clearAllData);

        // Load data on page load
        loadData();
    </script>
</body>
</html>
