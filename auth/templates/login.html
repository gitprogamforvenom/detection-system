<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SentinelLedger — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
  }
  .card {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px;
    padding: 48px 44px;
    width: 100%; max-width: 420px;
    box-shadow: 0 32px 64px rgba(0,0,0,0.5);
  }
  .logo { text-align: center; margin-bottom: 36px; }
  .logo h1 { font-size: 24px; font-weight: 700; background: linear-gradient(90deg,#a78bfa,#60a5fa); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
  .logo p  { color: rgba(255,255,255,0.4); font-size: 13px; margin-top: 4px; }
  .form-group { margin-bottom: 20px; }
  label { display: block; color: rgba(255,255,255,0.6); font-size: 12px; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 8px; }
  input {
    width: 100%; padding: 12px 16px;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 10px; color: #fff; font-size: 14px; font-family: 'Poppins', sans-serif;
    outline: none; transition: border-color 0.2s, background 0.2s;
  }
  input:focus { border-color: #7c3aed; background: rgba(124,58,237,0.08); }
  input::placeholder { color: rgba(255,255,255,0.25); }
  .btn {
    width: 100%; padding: 13px;
    background: linear-gradient(135deg, #7c3aed, #2563eb);
    color: white; border: none; border-radius: 10px;
    font-size: 15px; font-weight: 600; font-family: 'Poppins', sans-serif;
    cursor: pointer; transition: opacity 0.2s, transform 0.2s;
    margin-top: 8px;
  }
  .btn:hover { opacity: 0.9; transform: translateY(-1px); }
  .link-row { text-align: center; margin-top: 24px; color: rgba(255,255,255,0.4); font-size: 13px; }
  .link-row a { color: #a78bfa; text-decoration: none; font-weight: 600; }
  .link-row a:hover { text-decoration: underline; }
  .flash { padding: 11px 14px; border-radius: 10px; font-size: 13px; margin-bottom: 20px; }
  .flash.success { background: rgba(34,197,94,0.15); color: #4ade80; border: 1px solid rgba(34,197,94,0.3); }
  .flash.danger  { background: rgba(239,68,68,0.15);  color: #f87171; border: 1px solid rgba(239,68,68,0.3); }
  .flash.info    { background: rgba(59,130,246,0.15); color: #60a5fa; border: 1px solid rgba(59,130,246,0.3); }
  .divider { display: flex; align-items: center; gap: 12px; margin: 20px 0 24px; }
  .divider hr { flex:1; border: none; border-top: 1px solid rgba(255,255,255,0.1); }
  .divider span { color: rgba(255,255,255,0.3); font-size: 12px; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <h1>🛡 SentinelLedger</h1>
    <p>Fraud Detection &amp; Blockchain Audit Platform</p>
  </div>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
      <div class="flash {{ category }}">{{ message }}</div>
    {% endfor %}
  {% endwith %}

  <form method="POST" action="/login">
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" name="email" placeholder="you@example.com" required autofocus>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" name="password" placeholder="••••••••" required>
    </div>
    <button class="btn" type="submit">Sign In →</button>
  </form>

  <div class="divider"><hr><span>OR</span><hr></div>

  <div class="link-row">
    Don't have an account? <a href="/register">Create one here</a>
  </div>
</div>
</body>
</html>
